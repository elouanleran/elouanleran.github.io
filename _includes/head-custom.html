<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

{% if page.bg_image %}
<style>
  body {
    background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('{{ page.bg_image | relative_url }}') no-repeat center center fixed !important;
    background-size: cover !important;
  }
</style>
{% endif %}

{% if page.title == 'Accueil' %}
<header style="text-align: center; padding: 20px 0;">
  <h1 style="color: #4db8ff; text-transform: uppercase; letter-spacing: 5px; font-size: 3em; margin: 0;">
    ELOUAN LÉRAN
  </h1>
</header>
{% endif %}

<div style="background: rgba(0,0,0,0.8); padding: 15px; border-bottom: 2px solid #4db8ff; text-align: center; margin-bottom: 20px;">
  
  <a href="{{ '/' | relative_url }}" 
     style="margin: 0 15px; text-decoration: none; font-weight: bold; color: {% if page.title == 'Accueil' %}#4db8ff{% else %}white{% endif %};">
     ACCUEIL
  </a>

  <a href="{{ '/enseignement.html' | relative_url }}" 
     style="margin: 0 15px; text-decoration: none; font-weight: bold; color: {% if page.title == 'Enseignement' %}#4db8ff{% else %}white{% endif %};">
     ENSEIGNEMENT
  </a>

  <a href="{{ '/recherche.html' | relative_url }}" 
     style="margin: 0 15px; text-decoration: none; font-weight: bold; color: {% if page.title == 'Recherche' %}#4db8ff{% else %}white{% endif %};">
     RECHERCHE
  </a>

  <a href="{{ '/musique.html' | relative_url }}" 
     style="margin: 0 15px; text-decoration: none; font-weight: bold; color: {% if page.title == 'Musique' %}#4db8ff{% else %}white{% endif %};">
     MUSIQUE
  </a>

  <a href="{{ '/sport.html' | relative_url }}" 
     style="margin: 0 15px; text-decoration: none; font-weight: bold; color: {% if page.title == 'Sport' %}#4db8ff{% else %}white{% endif %};">
     SPORT
  </a>

</div>
